<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeckSync | Visual TCG Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">DECK<span>SYNC</span></div>
    <div class="version">BUILD 2026.4.12</div>
</header>

<main>
    <div class="container">
        <div class="input-card">
            <div class="input-grid">
                <div class="input-group">
                    <label>Deck 1 (Alpha)</label>
                    <textarea id="d1" placeholder="Pega el Deck 1 aquí..."></textarea>
                </div>
                <div class="input-group">
                    <label>Deck 2 (Beta)</label>
                    <textarea id="d2" placeholder="Pega el Deck 2 aquí..."></textarea>
                </div>
            </div>

            <div class="action-bar">
                <button onclick="sync()">Sincronizar Decks</button>
                <button class="btn-clear" onclick="window.location.reload()">Limpiar</button>
            </div>
        </div>

        <div id="sync-summary" class="sync-info">
            <div class="summary-text">
                Cartas totales: <b id="total-global">0</b>
            </div>
            <div class="view-switch">
                <button id="btn-list" class="view-btn" onclick="setView('list')">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg>
                </button>
                <button id="btn-grid" class="view-btn active" onclick="setView('grid')">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zM2.5 2a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3zm6.5.5A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm1.5-.5a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3zM1 10.5A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm1.5-.5a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3zm6.5.5A1.5 1.5 0 0 1 10.5 9h3a1.5 1.5 0 0 1 1.5 1.5v3a1.5 1.5 0 0 1-1.5 1.5h-3A1.5 1.5 0 0 1 9 13.5v-3zm1.5-.5a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3z"/></svg>
                </button>
            </div>
        </div>

        <div class="output-grid" id="res">
            <div class="card-column col-a">
                <div class="column-header">
                    <h3>Exclusivos Alpha</h3>
                    <div class="column-total" id="t-a">TOTAL: 0</div>
                </div>
                <div id="out-a" class="card-display grid-mode"></div>
            </div>

            <div class="card-column col-shared">
                <div class="column-header">
                    <h3>Core Compartido</h3>
                    <div class="column-total" id="t-shared">TOTAL: 0</div>
                </div>
                <div id="out-shared" class="card-display grid-mode"></div>
            </div>

            <div class="card-column col-b">
                <div class="column-header">
                    <h3>Exclusivos Beta</h3>
                    <div class="column-total" id="t-b">TOTAL: 0</div>
                </div>
                <div id="out-b" class="card-display grid-mode"></div>
            </div>
        </div>
    </div>
</main>

<footer>
    DeckSync Utility © 2026 | By Willyperic0
</footer>

<script src="script.js"></script>
</body>
</html>
